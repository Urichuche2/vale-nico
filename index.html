<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchísimas Felicidades Nicolás!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text x="0" y="24" font-size="24">🎂</text></svg>') 12 2, auto;
        }

        /* ===== PANTALLA DE SPLASH ===== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 25%, #c44569 50%, #f8b500 75%, #ff6b6b 100%);
            background-size: 400% 400%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: gradientShift 8s ease infinite;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .splash-content {
            text-align: center;
            animation: splashBounce 2s ease-out;
        }

        @keyframes splashBounce {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .splash-cake {
            font-size: 120px;
            margin-bottom: 30px;
            animation: splashCakeBounce 1s ease-out infinite;
        }

        @keyframes splashCakeBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        .splash-text {
            font-size: 3.5em;
            color: white;
            text-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            animation: textPulse 2s ease-out;
        }

        @keyframes textPulse {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== PANTALLA PRINCIPAL ===== */
        #main-screen {
            display: none;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 300% 300%;
            animation: mainGradient 15s ease infinite;
            overflow-y: auto;
            padding: 40px 20px;
        }

        @keyframes mainGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-cake {
            font-size: 100px;
            margin-bottom: 20px;
            animation: headerCakeBounce 2s ease-out infinite;
            display: inline-block;
        }

        @keyframes headerCakeBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        h1 {
            font-size: 4em;
            color: white;
            margin-bottom: 15px;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            animation: titleBounceIn 0.8s ease-out;
        }

        @keyframes titleBounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .subtitle {
            font-size: 1.8em;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .age-number {
            font-size: 15em;
            font-weight: 900;
            color: white;
            text-shadow: 6px 6px 12px rgba(0, 0, 0, 0.3), -2px -2px 4px rgba(255, 255, 255, 0.2);
            margin: -30px 0;
            animation: ageNumberBounce 2.5s ease-out;
            line-height: 0.9;
        }

        @keyframes ageNumberBounce {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-180deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.1) rotate(10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .stars-decoration {
            font-size: 2.5em;
            margin: 20px 0;
            animation: starsTwinkle 1.5s infinite;
        }

        @keyframes starsTwinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        .activities-container {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .activities-title {
            font-size: 2.2em;
            color: white;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .activity-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 255, 0.9) 100%);
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border: 3px solid transparent;
            animation: cardPopIn 0.6s ease-out backwards;
        }

        .activity-card:nth-child(1) { animation-delay: 0.1s; }
        .activity-card:nth-child(2) { animation-delay: 0.2s; }
        .activity-card:nth-child(3) { animation-delay: 0.3s; }
        .activity-card:nth-child(4) { animation-delay: 0.4s; }
        .activity-card:nth-child(5) { animation-delay: 0.5s; }
        .activity-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes cardPopIn {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .activity-card:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-15px) scale(1.08);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
            border-color: white;
        }

        .emoji-activity {
            font-size: 2.5em;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .activity-card:hover .emoji-activity {
            transform: scale(1.3) rotate(15deg);
        }

        .activity-name {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.2);
            border-left: 5px solid white;
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(-2px);
        }

        button:nth-child(2) {
            background: linear-gradient(135deg, #4ecdc4 0%, #44b3aa 100%);
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.4);
        }

        button:nth-child(2):hover {
            box-shadow: 0 12px 30px rgba(78, 205, 196, 0.6);
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
            margin-top: 40px;
        }

        /* ===== CONFETI MEJORADO ===== */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotateZ(720deg);
                opacity: 0;
            }
        }

        @keyframes confettiSwing {
            0%, 100% {
                transform: translateX(0) rotateZ(0deg);
            }
            25% {
                transform: translateX(50px) rotateZ(90deg);
            }
            50% {
                transform: translateX(0) rotateZ(180deg);
            }
            75% {
                transform: translateX(-50px) rotateZ(270deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .splash-text {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1.3em;
            }

            .activities-container {
                padding: 25px;
            }

            .activity-grid {
                grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
                gap: 15px;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            .splash-text {
                font-size: 1.5em;
            }

            .splash-cake {
                font-size: 80px;
            }

            .header-cake {
                font-size: 70px;
            }

            .subtitle {
                font-size: 1.1em;
            }

            .activity-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-container {
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE SPLASH -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-cake">🎂</div>
            <div class="splash-text">¡Muchísimas Felicidades!</div>
            <div class="splash-text" style="font-size: 2.5em; margin-top: 20px; color: #fff; text-shadow: 3px 3px 10px rgba(0,0,0,0.2);">Nicolás</div>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL -->
    <div id="main-screen">
        <div class="main-container">
            <div class="header">
                <div class="header-cake">🎂</div>
                <h1>¡Felicidades Nicolás!</h1>
                <div class="age-number">20</div>
                <div class="subtitle">Vale para hacer una actividad juntos</div>
                <div class="stars-decoration">✨ ⭐ ✨</div>
            </div>

            <div class="message-box">
                <p>Este es tu día especial, así que elige lo que más te apetezca.</p>
                <p style="margin-top: 10px;">¡Estamos listos para celebrarte! 🎉</p>
            </div>

            

            <div class="button-container">
                <button onclick="createConfetti()">🎊 Crear Confeti</button>
                <button onclick="playSound()">🔊 Sonido Celebración</button>
            </div>

            <footer>
                <p>Hecho con ❤️ para ti</p>
            </footer>
        </div>
    </div>

    <script>
        // Mostrar pantalla principal después de 2 segundos
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
                createConfetti();
            }, 2000);
        });

        // Función mejorada de confeti
        function createConfetti() {
            const colors = [
                '#ff6b6b', '#ee5a6f', '#c44569',
                '#f8b500', '#667eea', '#764ba2',
                '#4ecdc4', '#44b3aa', '#f093fb'
            ];

            const shapes = ['circle', 'square', 'rectangle', 'triangle'];

            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const confettiPiece = document.createElement('div');
                    confettiPiece.className = 'confetti-piece';

                    const size = Math.random() * 8 + 4;
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const startX = Math.random() * window.innerWidth;
                    const duration = Math.random() * 2 + 2.5;
                    const delay = Math.random() * 0.5;
                    const swingAmount = Math.random() * 100 - 50;

                    // Crear formas diferentes
                    if (shape === 'circle') {
                        confettiPiece.style.width = size + 'px';
                        confettiPiece.style.height = size + 'px';
                        confettiPiece.style.borderRadius = '50%';
                        confettiPiece.style.background = color;
                    } else if (shape === 'square') {
                        confettiPiece.style.width = size + 'px';
                        confettiPiece.style.height = size + 'px';
                        confettiPiece.style.background = color;
                    } else if (shape === 'rectangle') {
                        confettiPiece.style.width = size * 2 + 'px';
                        confettiPiece.style.height = size / 2 + 'px';
                        confettiPiece.style.background = color;
                    } else if (shape === 'triangle') {
                        confettiPiece.style.width = '0';
                        confettiPiece.style.height = '0';
                        confettiPiece.style.borderLeft = size / 2 + 'px solid transparent';
                        confettiPiece.style.borderRight = size / 2 + 'px solid transparent';
                        confettiPiece.style.borderBottom = size + 'px solid ' + color;
                    }

                    confettiPiece.style.left = startX + 'px';
                    confettiPiece.style.top = '-10px';
                    confettiPiece.style.animation = `confettiFall ${duration}s linear forwards`;
                    confettiPiece.style.animationDelay = delay + 's';
                    confettiPiece.style.opacity = '1';

                    document.body.appendChild(confettiPiece);

                    // Agregar movimiento lateral
                    const startTime = Date.now();
                    const animate = () => {
                        const elapsed = Date.now() - startTime;
                        const progress = elapsed / (duration * 1000);

                        if (progress < 1) {
                            const xOffset = Math.sin(progress * Math.PI * 4) * swingAmount;
                            confettiPiece.style.transform = `translateX(${xOffset}px) rotate(${progress * 720}deg)`;
                            requestAnimationFrame(animate);
                        }
                    };

                    requestAnimationFrame(animate);

                    setTimeout(() => confettiPiece.remove(), (duration + delay) * 1000);
                }, i * 30);
            }
        }

        // Función para reproducir sonido
        function playSound() {
            try {
                const audio = new Audio('assets/sound.mp3');
                audio.play().catch(err => {
                    console.log('No se pudo reproducir el sonido:', err);
                });
            } catch (e) {
                console.log('Error al reproducir sonido:', e);
            }
        }

        // Interactividad de tarjetas
        document.querySelectorAll('.activity-card').forEach(card => {
            card.addEventListener('click', function() {
                const activity = this.querySelector('.activity-name').textContent;
                createConfetti();
                playSound();
                // Agregar efecto visual
                this.style.animation = 'none';
                setTimeout(() => {
                    this.style.animation = '';
                }, 10);
            });
        });

        // Crear confeti al hacer clic en cualquier lugar
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON' && !e.target.closest('.activity-card')) {
                // Solo crear confeti si se hace clic en áreas específicas
            }
        });
    </script>
</body>
</html>
